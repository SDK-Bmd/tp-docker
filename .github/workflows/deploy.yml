# .github/workflows/deploy.yml
#
# Runs AFTER the build-and-push job succeeds on main.
# This is the "CD" part of CI/CD — continuous deployment to your server.
#
# Required GitHub Secrets:
#   SSH_PRIVATE_KEY   — the private key that was issued to you by Takima
#                       (paste the full contents, BEGIN/END lines included)
#   ANSIBLE_VAULT_PASSWORD  — the password you used for ansible-vault
#   SERVER_HOST       — your takima.io domain

name: Deploy to production

on:
  workflow_run:
    workflows: ["CI/CD devops"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    # Only run if the upstream CI workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/takima_key
          chmod 400 ~/.ssh/takima_key
          # Trust the server's host key on first connect
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Write vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ~/.vault_pass

      - name: Run Ansible playbook
        working-directory: ./ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i inventories/prod/setup.yml \
            playbook.yml \
            --vault-password-file ~/.vault_pass

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/takima_key ~/.vault_pass
