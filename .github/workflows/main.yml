name: CI devops 2025

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:

jobs:
  # Job 1: Build and test backend
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Build and test, then run SonarCloud analysis
      - name: Build and test with Maven + SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          YOUR_ORG_KEY: ${{ secrets.YOUR_ORG_KEY }}
          YOUR_PROJECT_KEY: ${{ secrets.YOUR_PROJECT_KEY }}
        run: mvn -B verify sonar:sonar -Dsonar.projectKey=${{ secrets.YOUR_PROJECT_KEY }} -Dsonar.organization=${{ secrets.YOUR_ORG_KEY }} -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }} --file ./backend-api/simple-api/pom.xml

  # Job 2: Build and push Docker images (only if tests passed)
  build-and-push-docker-image:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to Docker Hub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      # Build and push backend image
      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend-api/simple-api
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          # Push only on main branch
          push: ${{ github.ref == 'refs/heads/master' }}

      # Build and push database image
      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: ${{ github.ref == 'refs/heads/master' }}

      # Build and push httpd image
      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./http-server
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: ${{ github.ref == 'refs/heads/master' }}