name: CI devops 2025

on:
  # Trigger the pipeline when code is pushed to main or develop
  push:
    branches:
      - master
      - main
      - develop
  # Also trigger on any pull request
  pull_request:

jobs:
  # Job 1: build and test the backend
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      # Checkout the repository code
      - uses: actions/checkout@v4

      # Set up JDK 21 using the eclipse-temurin distribution
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Build and run tests with Maven
      - name: Build and test with Maven
        run: mvn clean verify --file ./backend-api/simple-api/pom.xml