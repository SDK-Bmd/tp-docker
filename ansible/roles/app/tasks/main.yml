---
# roles/app/tasks/main.yml
#
# Runs the Spring Boot API container.
# The DB_HOST env var is the name of the database service on the same
# Docker network — this is how containers find each other by name.

- name: Pull API image
  community.docker.docker_image:
    name: "{{ dockerhub_user }}/tp-devops-simple-api:latest"
    source: pull
    force_source: yes

- name: Run API container
  community.docker.docker_container:
    name: app
    image: "{{ dockerhub_user }}/tp-devops-simple-api:latest"
    state: started
    restart_policy: unless-stopped
    networks:
      - name: app-network
    env:
      DB_HOST: database
      DB_PORT: "5432"
      DB_NAME: "{{ postgres_db }}"
      DB_USER: "{{ postgres_user }}"
      DB_PASSWORD: "{{ postgres_password }}"
